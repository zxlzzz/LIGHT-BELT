; NOT HARDWARE VERIFIED.
[platformio]
core_dir = .pio/core
platforms_dir = .pio/platforms
packages_dir = .pio/packages
cache_dir = .pio/cache

[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = arduino
extra_scripts =
  pre:scripts/platformio_windows_sandbox.py
build_flags =
  -std=gnu++17
build_unflags =
  -std=gnu++11
