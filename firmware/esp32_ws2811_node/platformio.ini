; NOT HARDWARE VERIFIED.
[platformio]
; A hardware node must always be selected explicitly for build/upload.
default_envs = native
core_dir = .pio/core
platforms_dir = .pio/platforms
packages_dir = .pio/packages
cache_dir = .pio/cache
build_cache_dir = .pio/cache/build

[env:native]
platform = native
test_build_src = yes
build_src_filter =
  +<protocol.cpp>
  +<presentation_clock.cpp>
  +<frame_state.cpp>
  +<owned_frame.cpp>
  +<ws2811_spi_encoder.cpp>
  +<ws2811_spi3_encoder.cpp>
  +<ws2811_spi6_encoder.cpp>
  +<ws2811_parallel_spi_encoder.cpp>
  +<ws2811_rmt_encoder.cpp>
build_flags =
  -std=gnu++17

[esp32-s3-common]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
; Generic onsite ESP32-S3 N16R8: 16 MB quad flash + 8 MB octal PSRAM.
; Observed flash JEDEC ID is manufacturer 0x68, device 0x4018; that ID is
; hardware identity for verification and is not a programmable build setting.
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
framework = arduino
extra_scripts =
  pre:scripts/platformio_windows_sandbox.py
build_src_filter =
  +<*>
  -<cadence_diagnostic.cpp>
  -<cadence_spi6_diagnostic.cpp>
build_flags =
  -std=gnu++17
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
build_unflags =
  -std=gnu++11

[esp32-s3-fixed-gpio4-production]
extends = esp32-s3-common
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_FIXED_GPIO4_SPI=1
  -DLIGHT_BELT_REQUIRE_SCHEDULED_APPLY=1

[esp32-s3-node2-legacy-diagnostic]
extends = esp32-s3-common
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=2
  -DLIGHT_BELT_NODE2_LEGACY_MULTI_OUTPUT=1

[env:esp32-s3-node-1]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=1

[env:esp32-s3-node-2]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=2

; Temporary controlled A/B image: the same one-output GPIO4 SPI backend accepts
; both immediate and scheduled UDP v3 frames. It deliberately omits only the
; production policy that rejects immediate frames.
[env:esp32-s3-node-2-fixed-gpio4-presentation-ab]
extends = esp32-s3-common
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=2
  -DLIGHT_BELT_FIXED_GPIO4_SPI=1
  -DLIGHT_BELT_WS2811_RGB_OVERRIDE=1
  -DLIGHT_BELT_ENCODED_FRAME_DIAGNOSTIC=1

; Node 8 mirror of the unrestricted Immediate/Scheduled presentation A/B.
; It changes only the compiled node identity and exact 20-group descriptor.
[env:esp32-s3-node-8-fixed-gpio4-presentation-ab]
extends = esp32-s3-common
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=8
  -DLIGHT_BELT_FIXED_GPIO4_SPI=1
  -DLIGHT_BELT_WS2811_RGB_OVERRIDE=1
  -DLIGHT_BELT_ENCODED_FRAME_DIAGNOSTIC=1

; Unrestricted presentation A/B with one additional diagnostic variable:
; consecutive identical complete pixel payloads commit logically but do not
; repeat the physical SPI transaction. KEY and SAFE always write physically.
[esp32-s3-unrestricted-content-dedupe-ab]
extends = esp32-s3-common
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_FIXED_GPIO4_SPI=1
  -DLIGHT_BELT_WS2811_RGB_OVERRIDE=1
  -DLIGHT_BELT_ENCODED_FRAME_DIAGNOSTIC=1
  -DLIGHT_BELT_CONTENT_DEDUPE_AB=1

[env:esp32-s3-node-2-fixed-gpio4-content-dedupe-ab]
extends = esp32-s3-unrestricted-content-dedupe-ab
build_flags =
  ${esp32-s3-unrestricted-content-dedupe-ab.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=2

[env:esp32-s3-node-8-fixed-gpio4-content-dedupe-ab]
extends = esp32-s3-unrestricted-content-dedupe-ab
build_flags =
  ${esp32-s3-unrestricted-content-dedupe-ab.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=8

; Node8-only transaction-overlap diagnostic. It changes no pixel, SPI symbol,
; guard, Host cadence, or skip decision; only non-skipped Immediate Host writes
; wait 5 ms after preparation. Scheduled/startup/watchdog/recovery stay exact.
[env:esp32-s3-node-8-fixed-gpio4-content-dedupe-offset5ms-ab]
extends = esp32-s3-unrestricted-content-dedupe-ab
build_flags =
  ${esp32-s3-unrestricted-content-dedupe-ab.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=8
  -DLIGHT_BELT_CONTENT_DEDUPE_HOST_WRITE_OFFSET_US=5000

; Half-frame-slot transaction-separation diagnostic for 15 FPS Immediate
; playback. The 30 ms wait leaves more than 30 ms before the next Host frame.
[env:esp32-s3-node-8-fixed-gpio4-content-dedupe-offset30ms-ab]
extends = esp32-s3-unrestricted-content-dedupe-ab
build_flags =
  ${esp32-s3-unrestricted-content-dedupe-ab.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=8
  -DLIGHT_BELT_CONTENT_DEDUPE_HOST_WRITE_OFFSET_US=30000

; Emergency UDP A/B base. Each image still compiles one exact node and output
; descriptor; it never accepts multiple topologies at runtime.
[esp32-s3-emergency-change-only-ab]
extends = esp32-s3-common
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_FIXED_GPIO4_SPI=1
  -DLIGHT_BELT_WS2811_RGB_OVERRIDE=1
  -DLIGHT_BELT_ENCODED_FRAME_DIAGNOSTIC=1
  -DLIGHT_BELT_EMERGENCY_CHANGE_ONLY_AB=1

; Node 2 emergency UDP A/B only. It keeps logical frame/sequence/watchdog
; commits but suppresses a physical SPI transaction for a consecutive exact
; pixel-payload match. A strict ten-group state graph rejects unknown frames
; before queueing and holds the last admitted state until the watchdog black.
; Production environments do not define this macro.
[env:esp32-s3-node-2-emergency-change-only-ab]
extends = esp32-s3-emergency-change-only-ab
build_flags =
  ${esp32-s3-emergency-change-only-ab.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=2

; Node 8 / strip 42 exact-20 emergency A/B. COM assignment is an operator
; upload detail and is intentionally not part of the firmware topology.
[env:esp32-s3-node-8-emergency-change-only-ab]
extends = esp32-s3-emergency-change-only-ab
build_flags =
  ${esp32-s3-emergency-change-only-ab.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=8

; Hardware isolation only: receive complete Node 2 frames but transmit only
; output 1 on a permanently routed GPIO4 SPI signal.
[env:esp32-s3-node-2-fixed-gpio4-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_FIXED_GPIO4_SPI=1
  -DLIGHT_BELT_FIXED_GPIO4_DIAGNOSTIC=1

; Strip 42 A/B: after its DIN is moved to the known-good GPIO4 level-shifter
; channel, accept one 20-group output and keep GPIO5/GPIO6 inactive.
[env:esp32-s3-node-2-fixed-gpio4-strip42-diagnostic]
extends = esp32-s3-common
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=2
  -DLIGHT_BELT_FIXED_GPIO4_SPI=1
  -DLIGHT_BELT_FIXED_GPIO4_DIAGNOSTIC=1
  -DLIGHT_BELT_NODE2_GPIO4_STRIP42_DIAGNOSTIC=1

; Hardware candidate only: one QIO DMA transaction drives permanently routed
; DATA0/1/2 on GPIO4/5/6. DATA3 is routed to unconnected GPIO7 and always low.
[env:esp32-s3-node-2-qio-parallel-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_QIO_DIAGNOSTIC=1

; Hardware candidate: GPIO4 stays on permanent SPI2, GPIO5 uses permanent
; SPI3, and GPIO6 uses one permanent RMT TX channel.
[env:esp32-s3-node-2-hybrid-fixed-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_HYBRID_FIXED_DIAGNOSTIC=1

; A/B isolation only: physical wiring is unchanged, but SPI3 drives GPIO4 and
; SPI2 drives GPIO5. All encoding and clock settings remain identical.
[env:esp32-s3-node-2-hybrid-spi-host-swap-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_HYBRID_FIXED_DIAGNOSTIC=1
  -DLIGHT_BELT_HYBRID_SPI_HOST_SWAP=1

; Timing isolation only: preserve the proven GPIO4 SPI2 path while GPIO5 on
; SPI3 uses 2.4 MHz and a three-bit WS2811 symbol (0=100, 1=110).
[env:esp32-s3-node-2-gpio5-spi3bit-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_HYBRID_FIXED_DIAGNOSTIC=1
  -DLIGHT_BELT_GPIO5_SPI3BIT_DIAGNOSTIC=1

; Deliberately short T0H isolation: GPIO5 uses an exact 5 MHz SPI clock with
; six-bit symbols (0=100000, 1=111000). This is not a production timing.
[env:esp32-s3-node-2-gpio5-short-t0-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_HYBRID_FIXED_DIAGNOSTIC=1
  -DLIGHT_BELT_GPIO5_SPI6BIT_DIAGNOSTIC=1

; Strip 42 isolation only: drive GPIO5 from permanent RMT0 with a 500 us
; reset. GPIO4 and disconnected GPIO6 remain low and are never refreshed.
[env:esp32-s3-node-2-gpio5-rmt-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_HYBRID_FIXED_DIAGNOSTIC=1
  -DLIGHT_BELT_GPIO5_RMT_DIAGNOSTIC=1

; Full-frame RMT diagnostic using FastLED's IDF4 builtin driver. It stages the
; two installed Node 2 strips and submits both controllers in one show call.
[env:esp32-s3-node-2-fastled-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
lib_deps =
  fastled/FastLED @ 3.10.3
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_FASTLED_NODE2_DIAGNOSTIC=1
  -DFASTLED_RMT_BUILTIN_DRIVER=1
  -DFASTLED_RMT_MEM_BLOCKS=2
  -DFASTLED_RMT_MAX_CHANNELS=4

; Controlled physical-backend A/B: preserve the current one-output Node 2
; UDP/frame pipeline and replace only GPIO4 SPI transmission with FastLED RMT.
; RGB order matches the commissioned strip41 wiring.
[env:esp32-s3-node-2-fastled-gpio4-immediate-ab]
extends = esp32-s3-common
lib_extra_dirs =
  .pio/libdeps/esp32-s3-node-2-fastled-diagnostic
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=2
  -DLIGHT_BELT_FASTLED_GPIO4_IMMEDIATE_AB=1
  -DLIGHT_BELT_WS2811_RGB_OVERRIDE=1
  -DFASTLED_RMT_BUILTIN_DRIVER=1
  -DFASTLED_RMT_MEM_BLOCKS=2
  -DFASTLED_RMT_MAX_CHANNELS=4

[env:esp32-s3-node-3]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=3

[env:esp32-s3-node-4]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=4

[env:esp32-s3-node-5]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=5

[env:esp32-s3-node-6]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=6

[env:esp32-s3-node-7]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=7

[env:esp32-s3-node-8]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=8

[env:esp32-s3-node-9]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=9

[env:esp32-s3-node-10]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=10

[env:esp32-s3-node-11]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=11

[env:esp32-s3-node-12]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=12

[env:esp32-s3-node-13]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=13

; Temporary standalone gate for repeated-frame cadence on the installed
; GPIO4 strip. No Wi-Fi, UDP, clock, effects, or production runtime is built.
[env:esp32-s3-gpio4-cadence-diagnostic]
extends = esp32-s3-common
build_src_filter =
  -<*>
  +<cadence_diagnostic.cpp>
lib_extra_dirs =
  .pio/libdeps/esp32-s3-node-2-fastled-diagnostic
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_CADENCE_DIAGNOSTIC=1

; Same standalone cadence gate with only the WS2811 wire timing changed from
; FastLED's 800 kHz controller to its 400 kHz WS2811 controller.
[env:esp32-s3-gpio4-cadence-400khz-diagnostic]
extends = esp32-s3-common
build_src_filter =
  -<*>
  +<cadence_diagnostic.cpp>
lib_extra_dirs =
  .pio/libdeps/esp32-s3-node-2-fastled-diagnostic
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_CADENCE_DIAGNOSTIC=1
  -DLIGHT_BELT_WS2811_400KHZ=1

; Final standalone timing-margin gate. SPI at 5 MHz encodes each WS2811 bit
; into six SPI bits: 0=100000 and 1=111000 (200/600 ns high times).
[env:esp32-s3-gpio4-spi6-cadence-diagnostic]
extends = esp32-s3-common
build_src_filter =
  -<*>
  +<cadence_spi6_diagnostic.cpp>
  +<ws2811_spi6_encoder.cpp>
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_SPI6_CADENCE_DIAGNOSTIC=1

; Controlled timing A/B for the standalone cadence gate. All frame content,
; cadence, and 500 us low guards match the SPI6 image; only the WS2811 symbol
; timing changes to 3.2 MHz with 0=1000 and 1=1100.
[env:esp32-s3-gpio4-spi4-cadence-diagnostic]
extends = esp32-s3-common
build_src_filter =
  -<*>
  +<cadence_spi6_diagnostic.cpp>
  +<ws2811_spi_encoder.cpp>
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_SPI6_CADENCE_DIAGNOSTIC=1
  -DLIGHT_BELT_SPI4_CADENCE_DIAGNOSTIC=1

; Autonomous control for the presentation A/B. It uses the production SPI6
; encoder, RGB byte order, and Host static-step wire level without networking.
[env:esp32-s3-gpio4-spi6-rgb-static-diagnostic]
extends = esp32-s3-common
build_src_filter =
  -<*>
  +<cadence_spi6_diagnostic.cpp>
  +<ws2811_spi6_encoder.cpp>
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_SPI6_CADENCE_DIAGNOSTIC=1
  -DLIGHT_BELT_SPI6_RGB_STATIC_DIAGNOSTIC=1

; Emergency feasibility gate for limited effects. Every visible 5 FPS state
; is transmitted exactly once; an unchanged state is never refreshed during
; its 200 ms hold. This is not a production or hardware-margin environment.
[env:esp32-s3-gpio4-spi6-change-only-effects-diagnostic]
extends = esp32-s3-common
build_src_filter =
  -<*>
  +<cadence_spi6_diagnostic.cpp>
  +<ws2811_spi6_encoder.cpp>
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_SPI6_CADENCE_DIAGNOSTIC=1
  -DLIGHT_BELT_CHANGE_ONLY_EFFECTS_DIAGNOSTIC=1

; Short emergency exploration suite. Group zero stays commanded black while
; deterministic 5 FPS effects exercise groups 1-9 without repeated states.
[env:esp32-s3-gpio4-spi6-change-only-suite-diagnostic]
extends = esp32-s3-common
build_src_filter =
  -<*>
  +<cadence_spi6_diagnostic.cpp>
  +<ws2811_spi6_encoder.cpp>
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_SPI6_CADENCE_DIAGNOSTIC=1
  -DLIGHT_BELT_CHANGE_ONLY_SUITE_DIAGNOSTIC=1

; Power-of-two warm-palette exploration for the emergency 5 FPS path. It
; validates static orange/amber plus blue and orange flow and orange breath.
[env:esp32-s3-gpio4-spi6-change-only-warm-suite-diagnostic]
extends = esp32-s3-common
build_src_filter =
  -<*>
  +<cadence_spi6_diagnostic.cpp>
  +<ws2811_spi6_encoder.cpp>
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_SPI6_CADENCE_DIAGNOSTIC=1
  -DLIGHT_BELT_CHANGE_ONLY_WARM_SUITE_DIAGNOSTIC=1

; Final warm-animation containment gate. Red stays fixed at 0x20 while green
; switches only between the two static-verified 0x08 and 0x10 endpoints.
[env:esp32-s3-gpio4-spi6-two-level-warm-pulse-diagnostic]
extends = esp32-s3-common
build_src_filter =
  -<*>
  +<cadence_spi6_diagnostic.cpp>
  +<ws2811_spi6_encoder.cpp>
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_SPI6_CADENCE_DIAGNOSTIC=1
  -DLIGHT_BELT_TWO_LEVEL_WARM_PULSE_DIAGNOSTIC=1
