; NOT HARDWARE VERIFIED.
[platformio]
default_envs = esp32-s3-devkitc-1
core_dir = .pio/core
platforms_dir = .pio/platforms
packages_dir = .pio/packages
cache_dir = .pio/cache

[env:native]
platform = native
test_build_src = yes
build_src_filter =
  +<protocol.cpp>
  +<frame_state.cpp>
build_flags =
  -std=gnu++17

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
; Generic onsite ESP32-S3 N16R8: 16 MB quad flash + 8 MB octal PSRAM.
; Observed flash JEDEC ID is manufacturer 0x68, device 0x4018; that ID is
; hardware identity for verification and is not a programmable build setting.
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
framework = arduino
extra_scripts =
  pre:scripts/platformio_windows_sandbox.py
lib_deps =
  fastled/FastLED @ ^3.9.15
build_flags =
  -std=gnu++17
  -DBOARD_HAS_PSRAM
build_unflags =
  -std=gnu++11
