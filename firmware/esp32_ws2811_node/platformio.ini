; NOT HARDWARE VERIFIED.
[platformio]
core_dir = .pio/core
platforms_dir = .pio/platforms
packages_dir = .pio/packages
cache_dir = .pio/cache

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
extra_scripts =
  pre:scripts/platformio_windows_sandbox.py
lib_deps =
  fastled/FastLED @ ^3.9.15
build_flags =
  -std=gnu++17
build_unflags =
  -std=gnu++11
