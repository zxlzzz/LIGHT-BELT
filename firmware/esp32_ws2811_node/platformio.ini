; NOT HARDWARE VERIFIED.
[platformio]
; A hardware node must always be selected explicitly for build/upload.
default_envs = native
core_dir = .pio/core
platforms_dir = .pio/platforms
packages_dir = .pio/packages
cache_dir = .pio/cache
build_cache_dir = .pio/cache/build

[env:native]
platform = native
test_build_src = yes
build_src_filter =
  +<protocol.cpp>
  +<presentation_clock.cpp>
  +<frame_state.cpp>
  +<owned_frame.cpp>
  +<ws2811_spi_encoder.cpp>
  +<ws2811_spi3_encoder.cpp>
  +<ws2811_spi6_encoder.cpp>
  +<ws2811_parallel_spi_encoder.cpp>
  +<ws2811_rmt_encoder.cpp>
build_flags =
  -std=gnu++17

[esp32-s3-common]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
; Generic onsite ESP32-S3 N16R8: 16 MB quad flash + 8 MB octal PSRAM.
; Observed flash JEDEC ID is manufacturer 0x68, device 0x4018; that ID is
; hardware identity for verification and is not a programmable build setting.
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
framework = arduino
extra_scripts =
  pre:scripts/platformio_windows_sandbox.py
build_flags =
  -std=gnu++17
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
build_unflags =
  -std=gnu++11

[esp32-s3-fixed-gpio4-production]
extends = esp32-s3-common
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_FIXED_GPIO4_SPI=1
  -DLIGHT_BELT_REQUIRE_SCHEDULED_APPLY=1

[esp32-s3-node2-legacy-diagnostic]
extends = esp32-s3-common
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=2
  -DLIGHT_BELT_NODE2_LEGACY_MULTI_OUTPUT=1

[env:esp32-s3-node-1]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=1

[env:esp32-s3-node-2]
extends = esp32-s3-fixed-gpio4-production
build_flags =
  ${esp32-s3-fixed-gpio4-production.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=2

; Hardware isolation only: receive complete Node 2 frames but transmit only
; output 1 on a permanently routed GPIO4 SPI signal.
[env:esp32-s3-node-2-fixed-gpio4-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_FIXED_GPIO4_SPI=1
  -DLIGHT_BELT_FIXED_GPIO4_DIAGNOSTIC=1

; Strip 42 A/B: after its DIN is moved to the known-good GPIO4 level-shifter
; channel, accept one 20-group output and keep GPIO5/GPIO6 inactive.
[env:esp32-s3-node-2-fixed-gpio4-strip42-diagnostic]
extends = esp32-s3-common
build_flags =
  ${esp32-s3-common.build_flags}
  -DLIGHT_BELT_NODE_CONFIG=2
  -DLIGHT_BELT_FIXED_GPIO4_SPI=1
  -DLIGHT_BELT_FIXED_GPIO4_DIAGNOSTIC=1
  -DLIGHT_BELT_NODE2_GPIO4_STRIP42_DIAGNOSTIC=1

; Hardware candidate only: one QIO DMA transaction drives permanently routed
; DATA0/1/2 on GPIO4/5/6. DATA3 is routed to unconnected GPIO7 and always low.
[env:esp32-s3-node-2-qio-parallel-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_QIO_DIAGNOSTIC=1

; Hardware candidate: GPIO4 stays on permanent SPI2, GPIO5 uses permanent
; SPI3, and GPIO6 uses one permanent RMT TX channel.
[env:esp32-s3-node-2-hybrid-fixed-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_HYBRID_FIXED_DIAGNOSTIC=1

; A/B isolation only: physical wiring is unchanged, but SPI3 drives GPIO4 and
; SPI2 drives GPIO5. All encoding and clock settings remain identical.
[env:esp32-s3-node-2-hybrid-spi-host-swap-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_HYBRID_FIXED_DIAGNOSTIC=1
  -DLIGHT_BELT_HYBRID_SPI_HOST_SWAP=1

; Timing isolation only: preserve the proven GPIO4 SPI2 path while GPIO5 on
; SPI3 uses 2.4 MHz and a three-bit WS2811 symbol (0=100, 1=110).
[env:esp32-s3-node-2-gpio5-spi3bit-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_HYBRID_FIXED_DIAGNOSTIC=1
  -DLIGHT_BELT_GPIO5_SPI3BIT_DIAGNOSTIC=1

; Deliberately short T0H isolation: GPIO5 uses an exact 5 MHz SPI clock with
; six-bit symbols (0=100000, 1=111000). This is not a production timing.
[env:esp32-s3-node-2-gpio5-short-t0-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_HYBRID_FIXED_DIAGNOSTIC=1
  -DLIGHT_BELT_GPIO5_SPI6BIT_DIAGNOSTIC=1

; Strip 42 isolation only: drive GPIO5 from permanent RMT0 with a 500 us
; reset. GPIO4 and disconnected GPIO6 remain low and are never refreshed.
[env:esp32-s3-node-2-gpio5-rmt-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_HYBRID_FIXED_DIAGNOSTIC=1
  -DLIGHT_BELT_GPIO5_RMT_DIAGNOSTIC=1

; Full-frame RMT diagnostic using FastLED's IDF4 builtin driver. It stages the
; two installed Node 2 strips and submits both controllers in one show call.
[env:esp32-s3-node-2-fastled-diagnostic]
extends = esp32-s3-node2-legacy-diagnostic
lib_deps =
  fastled/FastLED @ 3.10.3
build_flags =
  ${esp32-s3-node2-legacy-diagnostic.build_flags}
  -DLIGHT_BELT_FASTLED_NODE2_DIAGNOSTIC=1
  -DFASTLED_RMT_BUILTIN_DRIVER=1
  -DFASTLED_RMT_MEM_BLOCKS=2
  -DFASTLED_RMT_MAX_CHANNELS=4

