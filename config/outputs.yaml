# Light Engine Outputs Configuration

outputs:
  # Explicit output transport mode:
  # - memory: non-hardware in-memory transport, NOT HARDWARE VERIFIED
  # - fake: benchmark-only success path, NOT HARDWARE VERIFIED
  # - production: real transports; open/send failures are explicit
  mode: "memory"
  exit_safe_state: true

  # Enabled output backends
  enabled:
    - "simulator"
    - "json"

  # Simulator output
  simulator:
    type: "terminal"          # terminal, html, png_sequence
    width: 120                # Display width in characters
    show_fps: true
    show_debug: true

  # JSON output (for debugging)
  json:
    path: "output/light_data.jsonl"
    compress: false
    pretty: false

  # Null output (for benchmarking)
  null:
    enabled: false

  # UDP v2 output (for ESP32-S3 digital nodes)
  udp_v2:
    enabled: false
    protocol_version: 2

  # RS-485 v2 output (for STM32 analog RGB+CCT nodes)
  rs485_v2:
    enabled: false

  # Serial port settings used by rs485_v2 in production mode
  serial:
    enabled: false
    port: "COM3"
    baudrate: 115200
    protocol_version: 2
