# Cabin Lighting v3 production topology.  Node hosts are documentation-only
# placeholders until installation assigns addresses.  NOT HARDWARE VERIFIED.
# Logical strip IDs, installation numbers, ESP32 node IDs and GPIO numbers are
# intentionally separate values.

outputs:
  mode: "production"
  enabled: ["rs485_v2", "udp_v3"]
  udp_v3:
    enabled: true
    protocol_version: 3

layout:
  topology_version: 3
  total_strips: 13
  zones:
    - id: "zone_32"
      type: "rgbcct"
      label: "COB installation 32"
      video_zone: "left"
      direction: "forward"
  analog_nodes:
    # 17 is a configurable RS-485 protocol address, not installation number 32.
    - node_id: 17
      zone_id: "zone_32"
      video_zone: "left"
      channel_order: "RGBWC"
      fade_ms: 0
  strips:
    - {id: "strip_11", type: digital, pixel_count: 10, video_zone: top, direction: forward}
    - {id: "strip_12", type: digital, pixel_count: 40, video_zone: top, direction: forward}
    - {id: "strip_21", type: digital, pixel_count: 10, video_zone: bottom, direction: forward}
    - {id: "strip_22", type: digital, pixel_count: 40, video_zone: bottom, direction: forward}
    - {id: "strip_31", type: digital, pixel_count: 10, video_zone: left, direction: forward}
    - {id: "strip_41", type: digital, pixel_count: 10, video_zone: right, direction: forward}
    - {id: "strip_42", type: digital, pixel_count: 20, video_zone: right, direction: forward}
    - {id: "strip_43", type: digital, pixel_count: 20, video_zone: right, direction: forward}
    - {id: "strip_44", type: digital, pixel_count: 20, video_zone: right, direction: forward}
    - {id: "strip_45", type: digital, pixel_count: 20, video_zone: right, direction: forward}
    - {id: "strip_91", type: digital, pixel_count: 20, video_zone: top, direction: forward}
    - {id: "strip_92", type: digital, pixel_count: 20, video_zone: top, direction: forward}
    - {id: "strip_93", type: digital, pixel_count: 20, video_zone: right, direction: forward}
  digital_nodes:
    - {node_id: 1, host: "192.0.2.1", port: 9001, pixel_count: 30, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 2, host: "192.0.2.2", port: 9001, pixel_count: 50, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 3, host: "192.0.2.3", port: 9001, pixel_count: 60, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 4, host: "192.0.2.4", port: 9001, pixel_count: 80, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 5, host: "192.0.2.5", port: 9001, pixel_count: 40, max_udp_payload: 1400, protocol_version: 3}
  digital_segments: []
  digital_outputs:
    - {node_id: 1, output_id: 1, gpio: 4, strip_id: "strip_11", pixel_count: 10, direction: forward}
    - {node_id: 1, output_id: 2, gpio: 5, strip_id: "strip_21", pixel_count: 10, direction: forward}
    - {node_id: 1, output_id: 3, gpio: 6, strip_id: "strip_31", pixel_count: 10, direction: forward}
    - {node_id: 2, output_id: 1, gpio: 4, strip_id: "strip_41", pixel_count: 10, direction: forward}
    - {node_id: 2, output_id: 2, gpio: 5, strip_id: "strip_42", pixel_count: 20, direction: forward}
    - {node_id: 2, output_id: 3, gpio: 6, strip_id: "strip_43", pixel_count: 20, direction: forward}
    - {node_id: 3, output_id: 1, gpio: 4, strip_id: "strip_44", pixel_count: 20, direction: forward}
    - {node_id: 3, output_id: 2, gpio: 5, strip_id: "strip_45", pixel_count: 20, direction: forward}
    - {node_id: 3, output_id: 3, gpio: 6, strip_id: "strip_93", pixel_count: 20, direction: forward}
    - {node_id: 4, output_id: 1, gpio: 4, strip_id: "strip_12", pixel_count: 40, direction: forward}
    - {node_id: 4, output_id: 2, gpio: 5, strip_id: "strip_91", pixel_count: 20, direction: forward}
    - {node_id: 4, output_id: 3, gpio: 6, strip_id: "strip_92", pixel_count: 20, direction: forward}
    - {node_id: 5, output_id: 1, gpio: 4, strip_id: "strip_22", pixel_count: 40, direction: forward}
  virtual_paths:
    - id: "screen_to_top"
      segments:
        - {strip_id: "strip_11", source_start: 0, pixel_count: 10, direction: forward}
        - {strip_id: "strip_12", source_start: 0, pixel_count: 40, direction: forward}
    - id: "screen_to_bottom"
      segments:
        - {strip_id: "strip_21", source_start: 0, pixel_count: 10, direction: forward}
        - {strip_id: "strip_22", source_start: 0, pixel_count: 40, direction: forward}
        - {strip_id: "strip_31", source_start: 0, pixel_count: 10, direction: forward}
    - id: "screen_to_wave_wall"
      segments:
        - {strip_id: "strip_41", source_start: 0, pixel_count: 10, direction: forward}
        - {strip_id: "strip_42", source_start: 0, pixel_count: 20, direction: forward}
        - {strip_id: "strip_43", source_start: 0, pixel_count: 20, direction: forward}
        - {strip_id: "strip_44", source_start: 0, pixel_count: 20, direction: forward}
        - {strip_id: "strip_45", source_start: 0, pixel_count: 20, direction: forward}
        - {strip_id: "strip_91", source_start: 0, pixel_count: 20, direction: forward}
        - {strip_id: "strip_92", source_start: 0, pixel_count: 20, direction: forward}
        - {strip_id: "strip_93", source_start: 0, pixel_count: 20, direction: forward}
  video_zone_map:
    left: ["zone_32", "strip_31"]
    right: ["strip_41", "strip_42", "strip_43", "strip_44", "strip_45", "strip_93"]
    top: ["strip_11", "strip_12", "strip_91", "strip_92"]
    bottom: ["strip_21", "strip_22"]
    center: []
