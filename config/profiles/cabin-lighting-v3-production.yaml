# Cabin Lighting v3 production topology. Each WS2811 strip has one ESP32 and
# one GPIO4 output. Node hosts are documentation-only placeholders until
# installation assigns addresses. NOT HARDWARE VERIFIED.
# Logical strip IDs, installation numbers, ESP32 node IDs and GPIO numbers are
# intentionally separate values.

outputs:
  mode: "production"
  enabled: ["rs485_v2", "udp_v3"]
  # Intentionally invalid until the installer enters the actual RS-485 port.
  # Production fails explicitly; it never changes itself to memory/fake mode.
  serial:
    port: "REPLACE_WITH_RS485_PORT"
    baudrate: 115200
  rs485_v2:
    enabled: true
  udp_v3:
    enabled: true
    protocol_version: 3
    presentation:
      mode: "scheduled"
      lead_us: 20000
      session_start_repeats: 3
      session_start_spacing_us: 2000
      beacon:
        host: "192.0.2.255"
        port: 9001
        interval_us: 500000
        startup_count: 5
        startup_spacing_us: 10000

layout:
  topology_version: 3
  digital_output_policy: "one_output_gpio4"
  total_strips: 13
  zones:
    - id: "zone_32"
      type: "rgbcct"
      label: "COB installation 32"
      video_zone: "left"
      direction: "forward"
  analog_nodes:
    # 17 is a configurable RS-485 protocol address, not installation number 32.
    - node_id: 17
      zone_id: "zone_32"
      video_zone: "left"
      channel_order: "RGBWC"
      fade_ms: 0
  strips:
    - {id: "strip_11", type: digital, pixel_count: 10, video_zone: top, direction: forward}
    - {id: "strip_12", type: digital, pixel_count: 40, video_zone: top, direction: forward}
    - {id: "strip_21", type: digital, pixel_count: 10, video_zone: bottom, direction: forward}
    - {id: "strip_22", type: digital, pixel_count: 40, video_zone: bottom, direction: forward}
    - {id: "strip_31", type: digital, pixel_count: 10, video_zone: left, direction: forward}
    - {id: "strip_41", type: digital, pixel_count: 10, video_zone: right, direction: forward}
    - {id: "strip_42", type: digital, pixel_count: 20, video_zone: right, direction: forward}
    - {id: "strip_43", type: digital, pixel_count: 20, video_zone: right, direction: forward}
    - {id: "strip_44", type: digital, pixel_count: 20, video_zone: right, direction: forward}
    - {id: "strip_45", type: digital, pixel_count: 20, video_zone: right, direction: forward}
    - {id: "strip_91", type: digital, pixel_count: 20, video_zone: top, direction: forward}
    - {id: "strip_92", type: digital, pixel_count: 20, video_zone: top, direction: forward}
    - {id: "strip_93", type: digital, pixel_count: 20, video_zone: right, direction: forward}
  digital_nodes:
    - {node_id: 1, host: "192.0.2.1", port: 9001, pixel_count: 10, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 2, host: "192.0.2.2", port: 9001, pixel_count: 10, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 3, host: "192.0.2.3", port: 9001, pixel_count: 20, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 4, host: "192.0.2.4", port: 9001, pixel_count: 40, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 5, host: "192.0.2.5", port: 9001, pixel_count: 40, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 6, host: "192.0.2.6", port: 9001, pixel_count: 10, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 7, host: "192.0.2.7", port: 9001, pixel_count: 10, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 8, host: "192.0.2.8", port: 9001, pixel_count: 20, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 9, host: "192.0.2.9", port: 9001, pixel_count: 20, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 10, host: "192.0.2.10", port: 9001, pixel_count: 20, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 11, host: "192.0.2.11", port: 9001, pixel_count: 20, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 12, host: "192.0.2.12", port: 9001, pixel_count: 20, max_udp_payload: 1400, protocol_version: 3}
    - {node_id: 13, host: "192.0.2.13", port: 9001, pixel_count: 20, max_udp_payload: 1400, protocol_version: 3}
  digital_segments: []
  digital_outputs:
    - {node_id: 1, output_id: 1, gpio: 4, strip_id: "strip_11", pixel_count: 10, direction: forward}
    - {node_id: 2, output_id: 1, gpio: 4, strip_id: "strip_41", pixel_count: 10, direction: forward}
    - {node_id: 3, output_id: 1, gpio: 4, strip_id: "strip_44", pixel_count: 20, direction: forward}
    - {node_id: 4, output_id: 1, gpio: 4, strip_id: "strip_12", pixel_count: 40, direction: forward}
    - {node_id: 5, output_id: 1, gpio: 4, strip_id: "strip_22", pixel_count: 40, direction: forward}
    - {node_id: 6, output_id: 1, gpio: 4, strip_id: "strip_21", pixel_count: 10, direction: forward}
    - {node_id: 7, output_id: 1, gpio: 4, strip_id: "strip_31", pixel_count: 10, direction: forward}
    - {node_id: 8, output_id: 1, gpio: 4, strip_id: "strip_42", pixel_count: 20, direction: forward}
    - {node_id: 9, output_id: 1, gpio: 4, strip_id: "strip_91", pixel_count: 20, direction: forward}
    - {node_id: 10, output_id: 1, gpio: 4, strip_id: "strip_92", pixel_count: 20, direction: forward}
    - {node_id: 11, output_id: 1, gpio: 4, strip_id: "strip_43", pixel_count: 20, direction: forward}
    - {node_id: 12, output_id: 1, gpio: 4, strip_id: "strip_45", pixel_count: 20, direction: forward}
    - {node_id: 13, output_id: 1, gpio: 4, strip_id: "strip_93", pixel_count: 20, direction: forward}
  # Show v2 owns the cabin's mixed analog/digital virtual paths.  Do not
  # duplicate them here using the legacy layout-only digital path schema.
  # Keeping this empty also makes duplicate path IDs impossible at load time.
  virtual_paths: []
  video_zone_map:
    left: ["zone_32", "strip_31"]
    right: ["strip_41", "strip_42", "strip_43", "strip_44", "strip_45", "strip_93"]
    top: ["strip_11", "strip_12", "strip_91", "strip_92"]
    bottom: ["strip_21", "strip_22"]
    center: []
