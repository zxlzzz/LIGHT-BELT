# First unrestricted linear-effect gate for Node8 and concurrent Node2+Node8.
# Pure blue preserves the accepted single-node breath content.
# NOT HARDWARE VERIFIED.
schema_version: 2

show:
  id: "ws2811-ab-two-node-blue-breath-staged-75s"
  duration: 75.0
  defaults:
    fade_in: 0.0
    fade_out: 0.0
    blend: "replace"
    min_effect_hold: 0.0
    switch_cooldown: 0.0

  cues:
    - id: "node8-only-blue-breath"
      start: 5.0
      end: 35.0
      target: {type: "digital_strip", id: "strip_42"}
      effect:
        mode: "fixed"
        id: "breath"
        params: {period: 6.0, min_brightness: 0.20}
      color: &blue {mode: "solid", color: [0.0, 0.0, 0.65]}

    - id: "both-node2-blue-breath"
      start: 40.0
      end: 70.0
      target: {type: "digital_strip", id: "strip_41"}
      effect:
        mode: "fixed"
        id: "breath"
        params: {period: 6.0, min_brightness: 0.20}
      color: *blue

    - id: "both-node8-blue-breath"
      start: 40.0
      end: 70.0
      target: {type: "digital_strip", id: "strip_42"}
      effect:
        mode: "fixed"
        id: "breath"
        params: {period: 6.0, min_brightness: 0.20}
      color: *blue
