# True Node8-only mirror of the accepted strip41 breath gate.
# NOT HARDWARE VERIFIED.
schema_version: 2

show:
  id: "ws2811-ab-strip42-blue-breath-40s"
  duration: 40.0
  defaults:
    fade_in: 0.0
    fade_out: 0.0
    blend: "replace"
    min_effect_hold: 0.0
    switch_cooldown: 0.0

  cues:
    - id: "strip42-blue-breath"
      start: 5.0
      end: 35.0
      target: {type: "digital_strip", id: "strip_42"}
      effect:
        mode: "fixed"
        id: "breath"
        params: {period: 6.0, min_brightness: 0.20}
      color: {mode: "solid", color: [0.0, 0.0, 0.65]}
