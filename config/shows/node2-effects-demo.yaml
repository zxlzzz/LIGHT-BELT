# Legacy-named strip 41/42 code-controlled therapeutic effects demonstration.
# The authored content is node-independent; production maps each strip to its
# own ESP32. Do not infer a shared Node 2 from this compatibility filename.
#
# Targets follow the reference show convention: every cue and brightness track
# addresses one digital_strip directly. Only strip_41 and strip_42 are used.
# No cue reads audio, beat, video, adaptive, or modulation state.
# Physical direction, color order, and comfort remain NOT HARDWARE VERIFIED.
