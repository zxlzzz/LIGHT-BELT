# Hardware diagnostic: both nodes render distinct stable colors together.
schema_version: 2

show:
  id: "ws2811-diagnostic-strip41-strip42"
  duration: 10.0
  defaults:
    fade_in: 0.0
    fade_out: 0.0
    blend: "replace"
    min_effect_hold: 0.0
    switch_cooldown: 0.0
  cues:
    - id: "strip41-static-green"
      start: 0.0
      end: 10.0
      target: {type: "digital_strip", id: "strip_41"}
      effect: {mode: "fixed", id: "static", params: {}}
      color: {mode: "solid", color: [0.10, 0.65, 0.20]}
    - id: "strip42-static-blue"
      start: 0.0
      end: 10.0
      target: {type: "digital_strip", id: "strip_42"}
      effect: {mode: "fixed", id: "static", params: {}}
      color: {mode: "solid", color: [0.10, 0.20, 0.65]}
