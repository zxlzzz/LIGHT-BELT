# Repeats the same static white gate so brightness stability is easy to judge.
schema_version: 2

show:
  id: "ws2811-strip42-gpio4-static"
  duration: 17.0
  defaults:
    fade_in: 0.0
    fade_out: 0.0
    blend: "replace"
    min_effect_hold: 0.0
    switch_cooldown: 0.0

  cues:
    - id: "strip42-white-first"
      start: 2.0
      end: 7.0
      target: {type: "digital_strip", id: "strip_42"}
      effect: {mode: "fixed", id: "static", params: {}}
      color: {mode: "solid", color: [1.0, 1.0, 1.0]}

    - id: "strip42-white-repeat"
      start: 9.0
      end: 14.0
      target: {type: "digital_strip", id: "strip_42"}
      effect: {mode: "fixed", id: "static", params: {}}
      color: {mode: "solid", color: [1.0, 1.0, 1.0]}
